name: Build Aqim APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Clean project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Show Flutter version
        run: flutter --version

      - name: Check Gradle configuration
        run: |
          echo "===== settings.gradle ====="
          cat android/settings.gradle

          echo
          echo "===== build.gradle ====="
          cat android/build.gradle

          echo
          echo "===== app/build.gradle ====="
          cat android/app/build.gradle

          echo
          echo "===== gradle-wrapper.properties ====="
          cat android/gradle/wrapper/gradle-wrapper.properties

          echo
          echo "===== Search shrinkResources ====="
          grep -R -n "shrinkResources" . || true

          echo
          echo "===== Search minifyEnabled ====="
          grep -R -n "minifyEnabled" . || true

      - name: Build Debug APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aqim-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
